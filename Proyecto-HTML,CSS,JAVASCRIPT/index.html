<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFit - Tu Nutrición Inteligente</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header>
        <h1>NutriFit</h1>
        <div id="user-nav" style="display: none;">
            <span id="nav-username"></span>
            <button onclick="logout()" class="btn-logout">Salir</button>
        </div>
    </header>

    <main>
        <section id="view-login" class="view active">
            <div class="card">
                <h2>Iniciar Sesión</h2>
                <form id="form-login" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="login-email" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-password" required placeholder="******">
                    </div>
                    <button type="submit">Entrar</button>
                    <p class="switch-form" onclick="switchView('view-register')">¿No tienes cuenta? Regístrate aquí</p>
                </form>
            </div>
        </section>

        <section id="view-register" class="view">
            <div class="card">
                <h2>Crear Cuenta Nutricional</h2>
                <form id="form-registro" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="reg-nombre" required placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="reg-password" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" id="reg-peso" required min="30" max="200" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Altura (cm)</label>
                        <input type="number" id="reg-altura" required min="100" max="250">
                    </div>
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="reg-edad" required min="14" max="100">
                    </div>
                    <div class="form-group">
                        <label>Género</label>
                        <select id="reg-genero">
                            <option value="hombre">Hombre</option>
                            <option value="mujer">Mujer</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nivel de Actividad</label>
                        <select id="reg-actividad">
                            <option value="1.2">Sedentario (Poco o ningún ejercicio)</option>
                            <option value="1.375">Ligero (Ejercicio 1-3 días/semana)</option>
                            <option value="1.55">Moderado (Ejercicio 3-5 días/semana)</option>
                            <option value="1.725">Fuerte (Ejercicio 6-7 días/semana)</option>
                        </select>
                    </div>
                    <button type="submit">Calcular y Registrarse</button>
                    <p class="switch-form" onclick="switchView('view-login')">¿Ya tienes cuenta? Inicia sesión</p>
                </form>
            </div>
        </section>

        <section id="view-dashboard" class="view">
            <div class="dashboard-grid">
                <div class="info-panel">
                    <h3>Tus Datos</h3>
                    <p style="margin: 1rem 0;">Metabolismo Basal: <strong id="dash-tmb">0</strong> kcal</p>
                    <hr style="margin: 1rem 0; border: 0; border-top: 1px solid #eee;">

                    <h4>Selecciona tu Objetivo:</h4>
                    <p style="font-size: 0.85rem; color:#7f8c8d; margin-bottom: 1rem;">Adaptará los contenidos a tus
                        necesidades.</p>
                    <button class="btn-objetivo selected" id="btn-def" onclick="setObjetivo('definicion')">Déficit /
                        Definición</button>
                    <button class="btn-objetivo" id="btn-man"
                        onclick="setObjetivo('mantenimiento')">Mantenimiento</button>
                    <button class="btn-objetivo" id="btn-vol" onclick="setObjetivo('volumen')">Superávit /
                        Volumen</button>

                    <div class="entrenamientos-section" style="margin-top: 2rem;">
                        <h4>Tu Rutina Recomendada</h4>
                        <div id="entrenamiento-contenido" style="margin-top: 0.5rem;">
                        </div>
                    </div>
                </div>

                <div>
                    <div
                        style="display:flex; justify-content: space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3>Recetas Recomendadas</h3>
                        <span id="fav-counter" style="font-weight:bold; color:var(--dark);">Favoritos: 0</span>
                    </div>
                    <div id="recetas-container" class="recetas-grid">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
